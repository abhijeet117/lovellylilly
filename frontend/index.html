<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LovellyLilly AI — Conversational Intelligence</title>
    <meta name="description" content="LovellyLilly is a thinking companion — built for depth, nuance, and genuine intellectual exchange. Conversational intelligence for the discerning mind." />
    <!-- Font System -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Big+Shoulders+Display:wght@800&family=Archivo:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@400;500;600&family=Josefin+Sans:wght@700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&family=DM+Serif+Display:ital@0;1&family=Bebas+Neue&display=swap" />
    <!-- Theme init (prevent flash) -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('ll-theme');
          if (t && ['dark','light','sand','ocean'].indexOf(t) !== -1) {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
